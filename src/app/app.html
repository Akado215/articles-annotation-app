<div class="app-shell">
  <main class="app-layout">
    <app-article-list
      class="app-layout__sidebar"
      [articles]="articles()"
      [selectedArticleId]="selectedArticleId()"
      [creating]="isCreating()"
      (createArticle)="startArticleCreation()"
      (selectArticle)="selectArticle($event)"
    />

    <section class="app-layout__content">
      <div class="app-layout__panel app-layout__panel--main">
        <app-article-editor
          *ngIf="isEditorMode(); else articleReaderBlock"
          [article]="selectedArticle()"
          [creating]="isCreating()"
          [annotationCount]="selectedArticle()?.annotations?.length ?? 0"
          [feedback]="feedback()"
          [feedbackFading]="feedbackFading()"
          (saveArticle)="saveArticle($event)"
          (cancelEditor)="cancelArticleEditor()"
        />

        <ng-template #articleReaderBlock>
          <app-article-reader
            [article]="selectedArticle()"
            [palette]="palette"
            [editingAnnotation]="editingAnnotation()"
            [feedback]="feedback()"
            [feedbackFading]="feedbackFading()"
            (createAnnotation)="createAnnotation($event)"
            (updateAnnotation)="updateAnnotation($event)"
            (editAnnotation)="requestAnnotationEdit($event)"
            (removeAnnotation)="removeAnnotation($event)"
            (editArticle)="startArticleEditing()"
            (deleteArticle)="deleteCurrentArticle()"
            (cancelDraft)="clearAnnotationDraft()"
          />
        </ng-template>
      </div>
    </section>
  </main>
</div>
